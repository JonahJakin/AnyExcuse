<title>AnyExcuse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b14;--surface:#0d1121;--card:#111827;--card2:#161e30;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --gold:#e8b84b;--text:#ede9e0;--sub:rgba(237,233,224,.45);--sub2:rgba(237,233,224,.22);
  --moon:#8bb8e8;--season:#72c47e;--quirky:#d97aaa;--sports:#6fa0d4;--astro:#9e85e0;
  --moon-bg:rgba(139,184,232,.12);--season-bg:rgba(114,196,126,.12);
  --quirky-bg:rgba(217,122,170,.12);--sports-bg:rgba(111,160,212,.12);--astro-bg:rgba(158,133,224,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) ease-in-out infinite var(--delay);opacity:0;}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--op)}}
.app{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;}
.header{display:flex;align-items:center;padding:14px 20px 10px;}
.logo{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;letter-spacing:-.3px;}
.logo em{color:var(--gold);font-style:normal;}
.logo-sub{font-size:10px;color:var(--sub2);letter-spacing:.8px;text-transform:uppercase;margin-top:1px;}
.tabs{display:flex;margin:0 16px 12px;background:var(--card);border-radius:12px;padding:3px;flex-shrink:0;border:1px solid var(--border);}
.tab{flex:1;height:34px;border:none;background:transparent;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:10px;cursor:pointer;transition:all .2s;}
.tab.on{background:var(--card2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4);}
.pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;transition:opacity .22s,transform .22s;}
.page::-webkit-scrollbar{display:none;}
.page.hidden{opacity:0;pointer-events:none;transform:translateX(28px);}
/* Home */
.home-scroll{padding:0 16px 100px;}
.hero{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;position:relative;margin-bottom:14px;cursor:pointer;}
.hero-glow{position:absolute;width:220px;height:220px;border-radius:50%;top:-70px;right:-70px;opacity:.14;filter:blur(55px);pointer-events:none;}
.hero-inner{position:relative;z-index:1;padding:18px 18px 16px;}
.hero-pill{display:inline-flex;align-items:center;gap:5px;font-size:9px;letter-spacing:1.2px;text-transform:uppercase;padding:3px 9px;border-radius:20px;margin-bottom:10px;font-weight:500;}
.hero-pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
.hero-emoji{font-size:38px;display:block;margin-bottom:8px;line-height:1;}
.hero-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;line-height:1.2;margin-bottom:5px;}
.hero-sug{font-size:12px;color:var(--sub);line-height:1.55;margin-bottom:14px;font-style:italic;}
.countdown{display:flex;gap:8px;margin-bottom:14px;}
.cd{flex:1;background:rgba(0,0,0,.35);border-radius:10px;padding:8px 4px;text-align:center;}
.cd-n{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--gold);line-height:1;}
.cd-l{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--sub2);margin-top:2px;}
.hero-btns{display:flex;gap:8px;}
.btn-primary{flex:1;height:40px;border-radius:10px;border:none;background:var(--gold);color:#060912;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s;}
.btn-primary:active{opacity:.8;}

// ── HELPERS ─────────────────────────────────────────────────────────
function nd(m,d){var n=new Date(),dt=new Date(n.getFullYear(),m-1,d);return dt<=n?new Date(n.getFullYear()+1,m-1,d):dt;}
function fd(y,m,d){return new Date(y,m-1,d);}
function daysUntil(dt){return Math.max(0,Math.floor((dt-Date.now())/864e5));}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}
function within365(d){return(d-Date.now())<=365*864e5;}

function getAllEvents(){
  var base=EVENTS.map(function(ev){return Object.assign({},ev,{date:ev.getDate()});});
  var custom=customEvents.map(function(c){
    var dt=new Date(c.dateStr+'T12:00:00');
    return {id:c.id,cat:'custom',emoji:c.emoji,name:c.name,date:dt,getDate:function(){return new Date(c.dateStr+'T12:00:00');},
      suggestion:c.suggestion||'Custom gathering \u2014 you set the vibe.',
      facts:[c.note||'A personal occasion worth celebrating','Saved to your Home tab automatically','Tap Share to send it to friends']};
  });
  return base.concat(custom).sort(function(a,b){return a.date-b.date;});
}

// ── COUNTDOWN ────────────────────────────────────────────────────────
var tickTimer=null;
function tick(){
  clearInterval(tickTimer);
  tickTimer=setInterval(function(){
    var saved=getSaved();
    if(!saved.length)return;
    function set(id,v){var el=document.getElementById(id);if(el)el.textContent=String(v).padStart(2,'0');}
    saved.forEach(function(ev,i){
      var diff=ev.date-Date.now();
      var pfx='cd_'+i+'_';
      if(diff<=0){set(pfx+'D','00');set(pfx+'H','00');set(pfx+'M','00');set(pfx+'S','00');return;}
      set(pfx+'D',Math.floor(diff/864e5));
      set(pfx+'H',Math.floor((diff%864e5)/36e5));
      set(pfx+'M',Math.floor((diff%36e5)/6e4));
      set(pfx+'S',Math.floor((diff%6e4)/1e3));
    });
  },1000);
}

// ── SUGGESTIONS ──────────────────────────────────────────────────────
function getSuggestions(){
  var sorted=getSorted(),now=Date.now();
  var unsaved=sorted.filter(function(ev){return!state.saved.has(ev.id)&&ev.date>now;});
  if(!unsaved.length)return[];
  // Rotate starting index through the full unsaved pool, pick 3 spaced apart
  var n=unsaved.length,s=state.suggestIdx%n,picks=[],seen={};
  for(var i=0;i<n&&picks.length<3;i++){
    var ev=unsaved[(s+i*Math.max(1,Math.floor(n/3)))%n];
    if(!seen[ev.id]){seen[ev.id]=1;picks.push(ev);}
  }
  // Fill any gaps
  for(var j=0;picks.length<3&&j<n;j++){
    if(!seen[unsaved[j].id]){seen[unsaved[j].id]=1;picks.push(unsaved[j]);}
  }
  return picks.slice(0,3);
}

function renderFilterBar(){
  var cats=[
    {id:'all',label:'All'},
    {id:'moon',label:'\uD83C\uDF15 Moon'},
    {id:'season',label:'\uD83C\uDF38 Season'},
    {id:'holiday',label:'\uD83C\uDF84 Holidays'},
    {id:'quirky',label:'\uD83C\uDF89 Occasions'},
    {id:'astro',label:'\uD83C\uDF20 Astronomy'},
    {id:'sports',label:'\u26BD Sports'},
    {id:'custom',label:'\u2605 Custom'}
  ];
  document.getElementById('filterBar').innerHTML=cats.map(function(c){
    return '<button class="filter-chip'+(state.filter===c.id?' on':'')+(c.id!=='all'?' cat-'+c.id:'')+'" data-cat="'+c.id+'">'+c.label+'</button>';
  }).join('');
  document.querySelectorAll('.filter-chip').forEach(function(b){
    b.addEventListener('click',function(){state.filter=b.dataset.cat;renderFilterBar();renderExcuses();});
  });
}

function renderExcuses(){
  var now=Date.now(),cutoff=now+365*864e5;
  var q=state.search.toLowerCase().trim();
  var sorted=getSorted();
  var pool=sorted.filter(function(ev){return ev.date>now&&(ev.cat==='custom'||ev.date<=cutoff);});
  var filtered=state.filter==='all'?pool:pool.filter(function(ev){return ev.cat===state.filter;});
  if(q){filtered=filtered.filter(function(ev){return ev.name.toLowerCase().includes(q)||(CAT_LABEL[ev.cat]||'').toLowerCase().includes(q);});}

  if(!filtered.length){
    document.getElementById('excuseList').innerHTML='<div style="text-align:center;padding:40px 0;color:var(--sub);font-size:13px;">No excuses found</div>';
    return;
  }

  document.getElementById('excuseList').innerHTML=filtered.map(function(ev){
    var added=state.saved.has(ev.id);
    return '<div class="excuse-card'+(added?' added':'')+'" data-id="'+ev.id+'">'+
      '<div class="excuse-icon cat-'+ev.cat+'">'+ev.emoji+'</div>'+
      '<div class="excuse-body">'+
        '<div class="excuse-name">'+ev.name+'</div>'+
        '<div class="excuse-date">'+fmtDate(ev.date)+'</div>'+
        '<div class="excuse-tag cat-'+ev.cat+'">'+CAT_LABEL[ev.cat]+'</div>'+
      '</div>'+
      '<div class="excuse-right">'+
        '<div class="excuse-days">'+daysUntil(ev.date)+'</div>'+
        '<div class="excuse-days-l">days</div>'+
        '<button class="add-btn'+(added?' on':'')+'" data-id="'+ev.id+'">'+(added?'\u2713':'+')+' </button>'+
      '</div>'+
    '</div>';
  }).join('');

  document.querySelectorAll('.excuse-card').forEach(function(c){
    c.addEventListener('click',function(e){if(e.target.closest('.add-btn'))return;openSheet(c.dataset.id);});
  });
  document.querySelectorAll('.add-btn').forEach(function(b){
    b.addEventListener('click',function(e){
      e.stopPropagation();
      if(state.saved.has(b.dataset.id))state.saved.delete(b.dataset.id);else state.saved.add(b.dataset.id);
      persist();renderAll();
    });
  });
}

  persistPlans();
  closePlansModal();
  renderAll();
}

function copyPlans(id){
  var ev=getSorted().find(function(x){return x.id===id;});
  var p=eventPlans[id];if(!p||!ev)return;
  var lines=[];
  lines.push('📅 '+ev.name+' — '+fmtDate(ev.date));
  if(p.when)lines.push('🕐 '+p.when);
  if(p.where)lines.push('📍 '+p.where);
  lines.push('');
  lines.push(p.desc||ev.suggestion);
  navigator.clipboard.writeText(lines.join('\n')).then(function(){
    // Brief visual feedback
    showToast();
  }).catch(function(){alert('Copy failed — try long-pressing the text.');});
}

// ── REVIEW ───────────────────────────────────────────────────────────
var reviewStarVal=0;

function checkPendingReviews(){
  var now=new Date();now.setHours(0,0,0,0);
  var saved=getSaved();
  // Find saved events with plans that have passed and haven't been reviewed
  var reviewed=eventHistory.map(function(h){return h.id;});
  for(var i=0;i<saved.length;i++){
    var ev=saved[i];
    var evDate=new Date(ev.date);evDate.setHours(0,0,0,0);
    if(eventPlans[ev.id]&&evDate<now&&reviewed.indexOf(ev.id)===-1){
      openReviewModal(ev.id);
      return; // one at a time
    }
  }
}

function openReviewModal(id){
  var ev=getSorted().find(function(x){return x.id===id;});if(!ev)return;
  state.reviewingId=id;
  reviewStarVal=0;
  document.getElementById('reviewEventName').textContent=ev.emoji+' '+ev.name;
  document.querySelectorAll('.review-stars .star').forEach(function(s){s.classList.remove('on');});
  document.getElementById('reviewNote').value='';
  document.getElementById('reviewOverlay').classList.add('on');
  document.getElementById('reviewModal').classList.add('on');
}

function closeReviewModal(){
  document.getElementById('reviewOverlay').classList.remove('on');
  document.getElementById('reviewModal').classList.remove('on');
  state.reviewingId=null;
}

function saveReview(){
  var id=state.reviewingId;if(!id)return;
  var ev=getSorted().find(function(x){return x.id===id;})||{name:'Event',emoji:'🎉',date:new Date()};
  eventHistory.unshift({
    id:id,
    name:ev.name,
    emoji:ev.emoji||'🎉',
    date:fmtDate(ev.date),
    stars:reviewStarVal,
    note:document.getElementById('reviewNote').value.trim(),
    savedAt:Date.now(),
  });
  persistHistory();
  // Remove from saved after review
  state.saved.delete(id);
  persist();
  closeReviewModal();
  renderAll();
}

// ── HISTORY ──────────────────────────────────────────────────────────
function renderHistory(){
  var el=document.getElementById('historyContent');
  if(!eventHistory.length){
    el.innerHTML='<div class="history-empty">No completed gatherings yet.<br>Set plans on a saved event and come back after it happens!</div>';
    return;
  }
  el.innerHTML=eventHistory.map(function(h){
    var stars='';
    for(var i=1;i<=5;i++)stars+='<span style="color:'+(i<=h.stars?'var(--gold)':'var(--border2)')+'">★</span>';
    return '<div class="history-card">'+
      '<div class="history-card-top">'+
        '<div class="history-card-emoji">'+h.emoji+'</div>'+
        '<div class="history-card-info">'+
          '<div class="history-card-name">'+escHtml(h.name)+'</div>'+
          '<div class="history-card-date">'+escHtml(h.date)+'</div>'+
        '</div>'+
        '<div class="history-card-stars">'+stars+'</div>'+
      '</div>'+
      (h.note?'<div class="history-card-note">\u201C'+escHtml(h.note)+'\u201D</div>':'')+
    '</div>';
  }).join('');
}


var GENERIC_INVITES = [
  function(ev,days){ return ev.name+' is coming up in about '+days+' days. Interested in celebrating?'; },
  function(ev,days){ return 'Hey! '+ev.name+' is '+days+' days away — anyone down to get together?'; },
  function(ev,days){ return days+' days until '+ev.name+'. Feels like a good excuse to hang out — who’s in?'; },
  function(ev,days){ return ev.name+' is right around the corner ('+days+' days). Let’s make something of it!'; },
];

var _sharePreviewText = '';

function smartShare(id){
  var ev=getAllEvents().find(function(x){return x.id===id;});
  if(!ev)return;
  var p=eventPlans[id];
  if(p){
    // Has plans — copy directly like before
    copyPlans(id);
    return;
  }
  // No plans — build generic invite and show preview
  var days=daysUntil(ev.date);
  var variant=GENERIC_INVITES[Math.floor(Math.random()*GENERIC_INVITES.length)];
  _sharePreviewText=ev.emoji+' '+variant(ev,days);
  document.getElementById('sharePreviewText').textContent=_sharePreviewText;
  document.getElementById('sharePreviewOverlay').classList.add('on');
  document.getElementById('sharePreviewModal').classList.add('on');
}

function closeSharePreview(){
  document.getElementById('sharePreviewOverlay').classList.remove('on');
  document.getElementById('sharePreviewModal').classList.remove('on');
}
function renderAll(){renderHome();if(state.tab===1){renderFilterBar();renderExcuses();}}
buildStars();
requestAnimationFrame(function(){renderAll();});


// ── PLANS MODAL BINDINGS ─────────────────────────────────────────────
document.getElementById('plansSave').addEventListener('click', savePlans);
document.getElementById('plansCancel').addEventListener('click', closePlansModal);
document.getElementById('plansOverlay').addEventListener('click', closePlansModal);

// ── REVIEW MODAL BINDINGS ────────────────────────────────────────────
document.getElementById('reviewSave').addEventListener('click', saveReview);
document.getElementById('reviewSkip').addEventListener('click', function(){
  // Mark as skipped so we don't keep prompting
  var id=state.reviewingId;
  if(id){
    eventHistory.unshift({id:id,skipped:true,savedAt:Date.now()});
    persistHistory();
    state.saved.delete(id);
    persist();
  }
  closeReviewModal();
  renderAll();
});
document.getElementById('reviewOverlay').addEventListener('click', closeReviewModal);

document.querySelectorAll('.review-stars .star').forEach(function(star){
  star.addEventListener('click', function(){
    reviewStarVal=parseInt(star.dataset.v);
    document.querySelectorAll('.review-stars .star').forEach(function(s){
      s.classList.toggle('on', parseInt(s.dataset.v)<=reviewStarVal);
    });
  });
});

// Check for pending reviews on load
checkPendingReviews();

// ── SHARE PREVIEW BINDINGS ───────────────────────────────────────────
document.getElementById('sharePreviewCopy').addEventListener('click', function(){
  navigator.clipboard.writeText(_sharePreviewText).then(function(){
    closeSharePreview();
    showToast();
  }).catch(function(){ closeSharePreview(); });
});
document.getElementById('sharePreviewCancel').addEventListener('click', closeSharePreview);
document.getElementById('sharePreviewOverlay').addEventListener('click', closeSharePreview);
// ── SWIPE ────────────────────────────────────────────────────────────
(function(){
  var el=document.querySelector('.pages');
  var startX=0,startY=0,locked=false;
  el.addEventListener('touchstart',function(e){
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    locked=false;
  },{passive:true});
  el.addEventListener('touchend',function(e){
    if(locked)return;
    var dx=e.changedTouches[0].clientX-startX;
    var dy=e.changedTouches[0].clientY-startY;
    if(Math.abs(dx)<Math.abs(dy)*1.5||Math.abs(dx)<50)return;
    if(dx<0&&state.tab===0)switchTab(1);
    else if(dx<0&&state.tab===1)switchTab(2);
    else if(dx>0&&state.tab===2)switchTab(1);
    else if(dx>0&&state.tab===1)switchTab(0);
  },{passive:true});
})();


</script>
